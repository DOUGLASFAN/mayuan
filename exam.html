<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马克思主义原理 - 刷题网站</title>
<style>
:root {
    --bg: #f8f9fa; --sidebar-bg: #ffffff; --card-bg: #ffffff;
    --text: #212529; --text-secondary: #6c757d; --border: #dee2e6;
    --primary: #4f46e5; --primary-light: #eef2ff; --primary-dark: #4338ca;
    --success: #059669; --success-light: #ecfdf5; --success-bg: #d1fae5;
    --danger: #dc2626; --danger-light: #fef2f2; --danger-bg: #fee2e2;
    --warning: #d97706; --warning-light: #fffbeb;
    --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
    --radius: 10px; --radius-sm: 6px; --transition: 0.2s ease;
}
[data-theme="dark"] {
    --bg: #1a1a2e; --sidebar-bg: #16213e; --card-bg: #1e2a3a;
    --text: #e2e8f0; --text-secondary: #94a3b8; --border: #334155;
    --primary: #818cf8; --primary-light: #1e1b4b; --primary-dark: #6366f1;
    --success: #34d399; --success-light: #064e3b; --success-bg: #065f46;
    --danger: #f87171; --danger-light: #450a0a; --danger-bg: #7f1d1d;
    --warning: #fbbf24; --warning-light: #451a03;
    --shadow: 0 1px 3px rgba(0,0,0,.3); --shadow-lg: 0 4px 12px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;display:flex;height:100vh;overflow:hidden}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Sidebar */
.sidebar{width:300px;min-width:300px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.sidebar-header h1{font-size:15px;font-weight:700;line-height:1.3;flex:1}
.sidebar-header .subtitle{font-size:11px;color:var(--text-secondary);margin-top:2px}
.theme-toggle{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;transition:var(--transition)}
.theme-toggle:hover{background:var(--primary-light)}
.filter-section{padding:10px 16px;border-bottom:1px solid var(--border);overflow-y:auto;flex-shrink:0;max-height:220px}
.filter-section .filter-title{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:4px;letter-spacing:.8px}
.filter-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.filter-tag{padding:2px 7px;font-size:11px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:var(--transition);user-select:none}
.filter-tag:hover{border-color:var(--primary);color:var(--primary)}
.filter-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.search-box{width:100%;padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:var(--transition);margin-bottom:6px}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.mode-selector{display:flex;gap:4px}
.mode-btn{flex:1;padding:5px 4px;font-size:10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:transparent;color:var(--text-secondary);transition:var(--transition);text-align:center;white-space:nowrap;line-height:1.2}
.mode-btn:hover{border-color:var(--primary);color:var(--primary)}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.stats-row{display:flex;gap:6px;padding:6px 16px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stats-row span{white-space:nowrap}
.stats-row .val{font-weight:600;color:var(--text)}
/* Question list */
.question-list{flex:1;overflow-y:auto;padding:6px 4px}
.q-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;transition:var(--transition);margin-bottom:1px;border-left:3px solid transparent}
.q-item:hover{background:var(--primary-light)}
.q-item.active{background:var(--primary);color:#fff;border-left-color:var(--primary)}
.q-item.active .q-meta{color:rgba(255,255,255,.7)}
.q-item.correct{border-left-color:var(--success)}
.q-item.wrong{border-left-color:var(--danger)}
.q-num{font-weight:700;min-width:22px;text-align:center;font-size:10px}
.q-meta{font-size:9px;color:var(--text-secondary);min-width:36px}
.q-stem-preview{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--sidebar-bg);flex-shrink:0}
.topbar-actions{display:flex;gap:8px;align-items:center}
.topbar-btn{padding:5px 10px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:transparent;color:var(--text);transition:var(--transition);display:flex;align-items:center;gap:4px}
.topbar-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.topbar-btn .badge{background:var(--danger);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;line-height:1.4}
.quiz-area{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;align-items:center}
.quiz-card{width:100%;max-width:820px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 28px;margin-bottom:16px}
.quiz-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.quiz-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.quiz-badge.single{background:#dbeafe;color:#1d4ed8}
.quiz-badge.multi{background:#fef3c7;color:#b45309}
.quiz-badge.essay{background:#fce7f3;color:#be185d}
.quiz-badge.material{background:#e0e7ff;color:#4338ca}
[data-theme="dark"] .quiz-badge.single{background:#1e3a5f;color:#93c5fd}
[data-theme="dark"] .quiz-badge.multi{background:#451a03;color:#fcd34d}
[data-theme="dark"] .quiz-badge.essay{background:#4a1942;color:#f9a8d4}
[data-theme="dark"] .quiz-badge.material{background:#1e1b4b;color:#a5b4fc}
.quiz-stem{font-size:15px;line-height:1.8;margin-bottom:18px;font-weight:500;white-space:pre-wrap}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);text-align:left;font-size:14px;background:var(--bg);line-height:1.5}
.option-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.option-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.option-btn.correct-answer{border-color:var(--success)!important;background:var(--success-bg)!important;color:var(--success)!important}
.option-btn.wrong-answer{border-color:var(--danger)!important;background:var(--danger-bg)!important;color:var(--danger)!important}
.option-btn.show-correct{border-color:var(--success)!important;background:var(--success-bg)!important;color:var(--success)!important}
.option-label{font-weight:700;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--border);color:var(--text-secondary);flex-shrink:0}
.option-btn.correct-answer .option-label,.option-btn.show-correct .option-label{background:var(--success);color:#fff}
.option-btn.wrong-answer .option-label{background:var(--danger);color:#fff}
.option-btn.answered{pointer-events:none;opacity:.85}
.answer-section{margin-top:16px;padding:14px;background:var(--success-light);border-radius:var(--radius-sm);border-left:3px solid var(--success)}
.answer-section .answer-title{font-weight:600;font-size:13px;color:var(--success);margin-bottom:6px}
.answer-section .answer-content{font-size:14px;line-height:1.8;white-space:pre-wrap}
.essay-toggle{margin-top:14px}
.essay-toggle button,.essay-toggle .show-btn{padding:8px 18px;font-size:13px;border:1px solid var(--primary);background:transparent;color:var(--primary);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-weight:500}
.essay-toggle button:hover,.essay-toggle .show-btn:hover{background:var(--primary);color:#fff}
.nav-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.nav-btn{padding:7px 16px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--card-bg);color:var(--text);transition:var(--transition);font-weight:500}
.nav-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.nav-btn:disabled:hover{background:var(--card-bg);color:var(--text);border-color:var(--border)}
.nav-info{font-size:12px;color:var(--text-secondary);min-width:50px;text-align:center}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .big-icon{font-size:48px;margin-bottom:10px;opacity:.5}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:92%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-header h2{font-size:15px;font-weight:700}
.modal-close{width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--text-secondary);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{padding:14px;background:var(--bg);border-radius:var(--radius-sm);text-align:center}
.stat-card .stat-val{font-size:26px;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:11px;color:var(--text-secondary);margin-top:2px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s}
.stat-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.stat-table th,.stat-table td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
.stat-table th{font-weight:600;color:var(--text-secondary);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.stat-table .good{color:var(--success);font-weight:600}
.stat-table .bad{color:var(--danger);font-weight:600}
/* Wrong book */
.wrong-item{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.wrong-item .wi-info{flex:1;min-width:0}
.wrong-item .wi-title{font-size:13px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:var(--primary)}
.wrong-item .wi-title:hover{text-decoration:underline}
.wrong-item .wi-meta{font-size:10px;color:var(--text-secondary)}
.wrong-item .wi-remove{padding:4px 10px;font-size:11px;border:1px solid var(--danger);color:var(--danger);background:transparent;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;transition:var(--transition)}
.wrong-item .wi-remove:hover{background:var(--danger);color:#fff}
.wrong-empty{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.confirm-btn{padding:7px 14px;font-size:12px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;transition:var(--transition)}
.confirm-btn.primary{background:var(--primary);color:#fff}
.confirm-btn.primary:hover{background:var(--primary-dark)}
.confirm-btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.confirm-btn.danger:hover{background:var(--danger);color:#fff}
.hidden{display:none!important}
/* Star / Favorite */
.star-btn{width:32px;height:32px;border:none;background:transparent;cursor:pointer;font-size:0;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;position:relative}
.star-btn:hover{background:var(--warning-light)}
.star-btn::before{content:'';display:block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid var(--border);position:relative;top:-3px}
.star-btn::after{content:'';display:block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:12px solid var(--border);position:absolute;top:6px}
.star-btn.faved::before,.star-btn.faved::after{border-bottom-color:#f59e0b;border-top-color:#f59e0b}
.star-btn::before,.star-btn::after{transition:border-color var(--transition)}
[data-theme="dark"] .star-btn.faved::before,[data-theme="dark"] .star-btn.faved::after{border-bottom-color:#fbbf24;border-top-color:#fbbf24}
/* Auto-advance toggle */
.auto-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary);padding:3px 8px;border-radius:12px;cursor:pointer;user-select:none;transition:var(--transition);border:1px solid var(--border);background:transparent;white-space:nowrap}
.auto-toggle:hover{border-color:var(--primary)}
.auto-toggle .toggle-track{width:28px;height:16px;background:var(--border);border-radius:8px;position:relative;transition:var(--transition);flex-shrink:0}
.auto-toggle .toggle-thumb{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:var(--transition);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.auto-toggle.on .toggle-track{background:var(--primary)}
.auto-toggle.on .toggle-thumb{left:14px}
.auto-toggle.on{color:var(--primary);border-color:var(--primary)}
/* Favorite badge */
.fav-badge{background:var(--warning);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;line-height:1.4}
@media(max-width:768px){
    .auto-toggle{font-size:10px;padding:2px 6px;gap:4px}
    .auto-toggle .toggle-track{width:24px;height:14px}
    .auto-toggle .toggle-thumb{width:10px;height:10px;top:2px;left:2px}
    .auto-toggle.on .toggle-thumb{left:12px}
}
/* Mobile */
.mobile-menu-btn{display:none;width:40px;height:40px;border:none;background:var(--bg);border-radius:var(--radius-sm);cursor:pointer;font-size:20px;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;transition:opacity .3s}
.sidebar-overlay.show{display:block}
@media(max-width:768px){
    body{flex-direction:column}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;min-width:280px;transform:translateX(-100%);transition:transform .3s;z-index:50;box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{display:block;pointer-events:none;opacity:0}
    .sidebar-overlay.show{opacity:1;pointer-events:auto}
    .mobile-menu-btn{display:flex}
    .topbar{padding:6px 10px}
    .topbar-actions{gap:4px;flex-wrap:wrap;justify-content:flex-end}
    .topbar-btn{padding:6px 8px;font-size:11px;min-height:34px}
    .topbar-btn span{display:none}
    .topbar-btn .badge{display:inline}
    .quiz-area{padding:10px;padding-bottom:80px}
    .quiz-card{padding:16px 12px;border-radius:var(--radius-sm)}
    .quiz-stem{font-size:14px;line-height:1.7}
    .option-btn{padding:12px 10px;font-size:13px;min-height:44px;align-items:center}
    .option-label{min-width:28px;height:28px;font-size:13px}
    .nav-row{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:8px 10px;border-top:1px solid var(--border);z-index:30;gap:8px;flex-wrap:nowrap}
    .nav-btn{padding:8px 14px;font-size:13px;min-height:40px;white-space:nowrap}
    .nav-info{font-size:11px;min-width:40px}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .stat-card{padding:12px 8px}
    .stat-card .stat-val{font-size:22px}
    .modal{width:96%;max-width:96vw;max-height:90vh;border-radius:var(--radius)}
    .modal-header{padding:12px 14px}
    .modal-header h2{font-size:14px}
    .modal-body{padding:12px 14px}
    .stat-table{font-size:11px}
    .stat-table th,.stat-table td{padding:5px 6px}
    .wrong-item{padding:8px 10px;flex-wrap:wrap}
    .wrong-item .wi-title{font-size:12px}
    .question-list{padding:4px 2px}
    .q-item{padding:7px 6px;font-size:12px;min-height:38px}
    .search-box{padding:8px 10px;font-size:13px;min-height:36px}
    .filter-tag{padding:4px 9px;font-size:12px}
    .mode-btn{padding:7px 4px;font-size:11px;min-height:32px}
    .filter-section{max-height:180px}
    .essay-toggle button,.essay-toggle .show-btn{padding:10px 20px;font-size:14px;min-height:44px}
    .answer-section{margin-top:12px;padding:12px}
    .answer-section .answer-content{font-size:13px}
}
@media(max-width:400px){
    .topbar-btn{padding:5px 6px;font-size:10px;min-height:30px}
    .nav-btn{padding:7px 10px;font-size:12px}
    .stat-grid{grid-template-columns:1fr}
    .quiz-header{flex-direction:column;align-items:flex-start}
    .option-btn{padding:10px 8px;font-size:12px;min-height:42px}
    .quiz-stem{font-size:13px}
    .topbar-actions{gap:2px}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div>
      <h1>马克思主义原理<br>刷题网站</h1>
      <div class="subtitle" id="totalCount">共 454 题</div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="切换主题">🌓</button>
  </div>

  <div class="filter-section">
    <div class="filter-title">章节筛选</div>
    <div class="filter-tags" id="chapterTags"></div>
    <div class="filter-title" style="margin-top:6px">题型筛选</div>
    <div class="filter-tags" id="typeTags"></div>
    <input type="text" class="search-box" id="searchInput" placeholder="搜索题目关键词...">
    <div class="filter-title" style="margin-top:6px">练习模式</div>
    <div class="mode-selector" id="modeSelector"></div>
  </div>

  <div class="stats-row" id="statsRow">
    <span>筛选结果: <span class="val" id="filteredCount">454</span></span>
    <span>已做: <span class="val" id="doneCount">0</span></span>
    <span>正确率: <span class="val" id="accuracy">-</span></span>
  </div>

  <div class="question-list" id="questionList"></div>
</aside>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    <div class="topbar-actions">
      <button class="auto-toggle on" id="autoAdvanceToggle" title="自动跳题">
        <span>自动跳题</span>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </button>
      <button class="topbar-btn" id="statBtn"><span>统计</span> 📊</button>
      <button class="topbar-btn" id="wrongBookBtn"><span>错题本</span> 📝 <span class="badge" id="wrongBadge" style="display:none">0</span></button>
      <button class="topbar-btn" id="favBookBtn"><span>收藏</span> ★ <span class="fav-badge" id="favBadge" style="display:none">0</span></button>
      <button class="topbar-btn" id="randomBtn"><span>随机跳题</span> 🎲</button>
    </div>
  </div>

  <div class="quiz-area" id="quizArea">
    <div class="empty-state">
      <div class="big-icon">📚</div>
      <p>从左侧列表选择题号开始刷题</p>
    </div>
  </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay hidden" id="statModal">
  <div class="modal">
    <div class="modal-header">
      <h2>学习统计</h2>
      <button class="modal-close" onclick="closeStatModal()">✕</button>
    </div>
    <div class="modal-body" id="statContent"></div>
  </div>
</div>

<!-- Wrong Book Modal -->
<div class="modal-overlay hidden" id="wrongModal">
  <div class="modal">
    <div class="modal-header">
      <h2>错题本</h2>
      <button class="modal-close" onclick="closeWrongModal()">✕</button>
    </div>
    <div class="modal-body" id="wrongContent"></div>
  </div>
</div>

<script>
let QUESTIONS = [];

// ========== Load Questions from JSON ==========
const TYPE_MAP = {
    'single_choice':      { type: 'single',   typeLabel: '单选' },
    'multiple_choice':    { type: 'multi',    typeLabel: '多选' },
    'essay':              { type: 'essay',    typeLabel: '简答' },
    'material_analysis':  { type: 'material', typeLabel: '材料' },
};

function transformQuestions(jsonData) {
    const questions = [];
    jsonData.forEach((chapter, chIdx) => {
        const chapterCode = 'ch' + chIdx;
        const chapterShort = chapter.chapter.split(/\s+/)[0];
        chapter.question_types.forEach(qt => {
            const typeInfo = TYPE_MAP[qt.type];
            if (!typeInfo) return;
            qt.questions.forEach(q => {
                questions.push({
                    id: 'ch' + chIdx + '-' + typeInfo.type + '-' + q.id,
                    chapter: chapter.chapter,
                    chapterCode: chapterCode,
                    chapterShort: chapterShort,
                    type: typeInfo.type,
                    typeLabel: typeInfo.typeLabel,
                    typeName: qt.type_name,
                    stem: q.stem,
                    answer: q.answer || '',
                    options: q.options || []
                });
            });
        });
    });
    return questions;
}

async function loadQuestions() {
    try {
        const resp = await fetch('data.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const jsonText = await resp.text();
        const jsonData = JSON.parse(jsonText);
        QUESTIONS = transformQuestions(jsonData);
        STORAGE.set('dataCache', { data: jsonText, timestamp: Date.now(), count: QUESTIONS.length });
        console.log('已加载 ' + QUESTIONS.length + ' 道题目');
        return true;
    } catch (err) {
        console.error('题库加载失败:', err);
        alert('题库加载失败，请检查网络或刷新重试。\n错误：' + err.message);
        return false;
    }
}



// ========== State ==========
const LS_PREFIX = 'marx_quiz_';
const STORAGE = {
    get(k) { try { return JSON.parse(localStorage.getItem(LS_PREFIX + k)); } catch(e) { return null; } },
    set(k, v) { localStorage.setItem(LS_PREFIX + k, JSON.stringify(v)); }
};

let state = {
    chapterFilter: new Set(STORAGE.get('chapterFilter') || QUESTIONS.map(q => q.chapterCode)),
    typeFilter: new Set(STORAGE.get('typeFilter') || ['single','multi','essay','material']),
    searchQuery: STORAGE.get('searchQuery') || '',
    mode: STORAGE.get('mode') || 'sequential', // sequential, random, wrong, undone, favorites
    currentIndex: 0,
    wrongSet: new Set(STORAGE.get('wrongSet') || []),
    favSet: new Set(STORAGE.get('favSet') || []),
    answers: STORAGE.get('answers') || {},
    theme: STORAGE.get('theme') || 'light',
    autoAdvance: STORAGE.get('autoAdvance') !== false, // default on
    randomOrder: null, // stable shuffled order for random mode (session-only, not persisted)
};

// Persist state
function saveWrongSet() { STORAGE.set('wrongSet', [...state.wrongSet]); }
function saveAnswers() { STORAGE.set('answers', state.answers); }
function saveFavSet() { STORAGE.set('favSet', [...state.favSet]); }
function saveFilterState() {
    STORAGE.set('chapterFilter', [...state.chapterFilter]);
    STORAGE.set('typeFilter', [...state.typeFilter]);
    STORAGE.set('searchQuery', state.searchQuery);
    STORAGE.set('mode', state.mode);
}

// ========== Filtering ==========
function getFilteredQuestions() {
    let qs = QUESTIONS.filter(q =>
        state.chapterFilter.has(q.chapterCode) && state.typeFilter.has(q.type)
    );
    if (state.searchQuery.trim()) {
        const kw = state.searchQuery.trim().toLowerCase();
        qs = qs.filter(q => q.stem.toLowerCase().includes(kw));
    }
    return qs;
}

function getModeQuestions() {
    let filtered = getFilteredQuestions();
    if (state.mode === 'wrong') {
        filtered = filtered.filter(q => state.wrongSet.has(q.id));
    }
    if (state.mode === 'favorites') {
        filtered = filtered.filter(q => state.favSet.has(q.id));
    }
    if (state.mode === 'undone') {
        // undone first: put unanswered questions first
        const undone = filtered.filter(q => !(q.id in state.answers));
        const done = filtered.filter(q => q.id in state.answers);
        return [...undone, ...done];
    }
    if (state.mode === 'random') {
        // Stable shuffle: generate once, reuse until explicitly invalidated
        const filteredIds = new Set(filtered.map(q => q.id));
        const needRegen = !state.randomOrder
            || state.randomOrder.length !== filtered.length
            || !state.randomOrder.every(id => filteredIds.has(id));
        if (needRegen) {
            state.randomOrder = [...filtered.map(q => q.id)];
            for (let i = state.randomOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.randomOrder[i], state.randomOrder[j]] = [state.randomOrder[j], state.randomOrder[i]];
            }
            // Reset index if out of bounds
            if (state.currentIndex >= state.randomOrder.length) {
                state.currentIndex = 0;
            }
        }
        // Map IDs back to questions in stable shuffled order
        const idMap = {};
        filtered.forEach(q => { idMap[q.id] = q; });
        return state.randomOrder.map(id => idMap[id]).filter(Boolean);
    }
    // Non-random mode: invalidate randomOrder to free memory
    state.randomOrder = null;
    return filtered;
}

// ========== Render ==========
function renderAll() {
    renderFilterTags();
    renderModeSelector();
    renderQuestionList();
    renderStatsRow();
    renderQuestion();
    updateWrongBadge();
}

function renderFilterTags() {
    const chapters = [...new Set(QUESTIONS.map(q => q.chapterCode))];
    const chapterNames = {};
    QUESTIONS.forEach(q => { chapterNames[q.chapterCode] = q.chapterShort; });

    document.getElementById('chapterTags').innerHTML = chapters.map(ch =>
        `<span class="filter-tag${state.chapterFilter.has(ch)?' active':''}" data-chapter="${ch}">${chapterNames[ch]}</span>`
    ).join('');

    const types = ['single','multi','essay','material'];
    const typeNames = {single:'单选',multi:'多选',essay:'论述',material:'材料分析'};
    document.getElementById('typeTags').innerHTML = types.map(t =>
        `<span class="filter-tag${state.typeFilter.has(t)?' active':''}" data-type="${t}">${typeNames[t]}</span>`
    ).join('');
}

function renderModeSelector() {
    const modes = [
        {id:'sequential',label:'📋 顺序'},
        {id:'random',label:'🎲 随机'},
        {id:'wrong',label:'📝 错题'},
        {id:'favorites',label:'★ 收藏'},
        {id:'undone',label:'🆕 未做'},
    ];
    document.getElementById('modeSelector').innerHTML = modes.map(m =>
        `<button class="mode-btn${state.mode===m.id?' active':''}" data-mode="${m.id}">${m.label}</button>`
    ).join('');
}

function renderQuestionList() {
    const qs = getModeQuestions();
    const list = document.getElementById('questionList');
    document.getElementById('filteredCount').textContent = getFilteredQuestions().length;

    if (qs.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:30px 10px"><p>没有匹配的题目</p></div>';
        document.getElementById('quizArea').innerHTML = '<div class="empty-state"><div class="big-icon">🔍</div><p>没有匹配的题目，请调整筛选条件</p></div>';
        return;
    }

    list.innerHTML = qs.map((q, i) => {
        const cls = [];
        if (i === state.currentIndex) cls.push('active');
        const record = state.answers[q.id];
        if (record) {
            cls.push(record.correct ? 'correct' : 'wrong');
        }
        const globalIdx = QUESTIONS.indexOf(q) + 1;
        return `<div class="q-item ${cls.join(' ')}" data-index="${i}">
            <span class="q-num">#${globalIdx}</span>
            <span class="q-meta">${q.chapterShort}·${q.typeLabel}</span>
            <span class="q-stem-preview">${escapeHtml(q.stem.substring(0,40))}</span>
        </div>`;
    }).join('');
}

function renderStatsRow() {
    const qs = getModeQuestions();
    const done = qs.filter(q => q.id in state.answers);
    const correct = done.filter(q => state.answers[q.id].correct);
    document.getElementById('doneCount').textContent = done.length;
    document.getElementById('accuracy').textContent = done.length > 0
        ? Math.round(correct.length / done.length * 100) + '%'
        : '-';
}

function renderQuestion() {
    const qs = getModeQuestions();
    const area = document.getElementById('quizArea');

    if (qs.length === 0) {
        area.innerHTML = '<div class="empty-state"><div class="big-icon">🔍</div><p>没有匹配的题目，请调整筛选条件</p></div>';
        return;
    }

    if (state.currentIndex >= qs.length) state.currentIndex = 0;
    if (state.currentIndex < 0) state.currentIndex = qs.length - 1;

    const q = qs[state.currentIndex];
    const globalIdx = QUESTIONS.indexOf(q) + 1;
    const record = state.answers[q.id];
    const isAnswered = !!record;

    let html = `<div class="quiz-card">
        <div class="quiz-header">
            <div style="display:flex;align-items:center;gap:8px">
                <span class="quiz-badge ${q.type}">#${globalIdx} ${q.chapterShort} · ${q.typeLabel}</span>
                <button class="star-btn${state.favSet.has(q.id)?' faved':''}" onclick="toggleFav('${q.id}')" title="${state.favSet.has(q.id)?'取消收藏':'收藏此题'}"></button>
            </div>
            <span style="font-size:11px;color:var(--text-secondary)">${isAnswered ? (record.correct ? '✅ 已答对' : '❌ 已答错') : '⏳ 未作答'}</span>
        </div>
        <div class="quiz-stem">${escapeHtml(q.stem)}</div>`;

    if (q.type === 'single' || q.type === 'multi') {
        html += '<div class="quiz-options">';
        q.options.forEach(opt => {
            let cls = 'option-btn';
            if (isAnswered) {
                cls += ' answered';
                const userAnswers = record.userAnswer || '';
                const correctAnswer = q.answer || '';
                if (q.type === 'single') {
                    if (opt.label === correctAnswer) cls += ' correct-answer';
                    else if (opt.label === userAnswers && opt.label !== correctAnswer) cls += ' wrong-answer';
                } else {
                    if (correctAnswer.includes(opt.label)) cls += ' show-correct';
                    if (userAnswers.includes(opt.label) && !correctAnswer.includes(opt.label)) cls += ' wrong-answer';
                }
            }
            html += `<div class="${cls}" data-label="${opt.label}">
                <span class="option-label">${opt.label}</span>
                <span>${escapeHtml(opt.text)}</span>
            </div>`;
        });
        html += '</div>';

        if (isAnswered && q.answer) {
            html += `<div class="answer-section">
                <div class="answer-title">✅ 正确答案: ${q.answer}</div>
            </div>`;
        }
        if (isAnswered && !q.answer) {
            html += `<div class="answer-section">
                <div class="answer-title">⚠️ 本题暂无标准答案</div>
            </div>`;
        }
    } else {
        // Essay or material
        const showAnswer = isAnswered || false;
        if (!showAnswer) {
            html += `<div class="essay-toggle">
                <button class="show-btn" onclick="showEssayAnswer()">📖 查看答案</button>
            </div>
            <div class="answer-section hidden" id="essayAnswer">
                <div class="answer-title">参考答案</div>
                <div class="answer-content">${escapeHtml(q.answer || '暂无答案')}</div>
            </div>`;
        } else {
            html += `<div class="answer-section">
                <div class="answer-title">参考答案</div>
                <div class="answer-content">${escapeHtml(q.answer || '暂无答案')}</div>
                <div style="margin-top:10px;display:flex;gap:8px">
                    <button class="nav-btn" onclick="markEssayCorrect()" style="font-size:12px">✅ 标记为已掌握</button>
                    <button class="nav-btn" onclick="markEssayWrong()" style="font-size:12px">❌ 标记为未掌握</button>
                </div>
            </div>`;
        }
    }

    html += `</div>`;

    // Navigation
    html += `<div class="nav-row">
        <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex===0?'disabled':''}>◀ 上一题</button>
        <span class="nav-info">${state.currentIndex + 1} / ${qs.length}</span>
        <button class="nav-btn" onclick="nextQuestion()" ${state.currentIndex>=qs.length-1?'disabled':''}>下一题 ▶</button>
    </div>`;

    area.innerHTML = html;

    // Re-highlight active in list and scroll into view
    const items = document.querySelectorAll('.q-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === state.currentIndex);
    });
    const activeItem = document.querySelector('.q-item.active');
    if (activeItem) activeItem.scrollIntoView({block:'nearest',behavior:'smooth'});

    // Bind option clicks
    if (!isAnswered && (q.type === 'single' || q.type === 'multi')) {
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                handleOptionClick(q, this);
            });
        });
    }
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ========== Actions ==========
function handleOptionClick(q, btn) {
    if (q.type === 'single') {
        handleSingleChoice(q, btn.dataset.label);
    } else {
        handleMultiChoice(q, btn.dataset.label);
    }
}

function handleSingleChoice(q, label) {
    const correct = (label === q.answer);
    const now = Date.now();
    state.answers[q.id] = {correct, timestamp: now, userAnswer: label};
    if (!correct && q.answer) state.wrongSet.add(q.id);
    if (correct) state.wrongSet.delete(q.id);
    saveAnswers();
    saveWrongSet();
    renderAll();
    // Auto-advance on correct answer
    if (correct && state.autoAdvance) {
        const qs = getModeQuestions();
        if (state.currentIndex < qs.length - 1) {
            const targetIdx = state.currentIndex;
            setTimeout(() => {
                if (state.currentIndex === targetIdx) {
                    state.currentIndex++;
                    renderAll();
                    STORAGE.set('currentIndex', state.currentIndex);
                }
            }, 1000);
        }
    }
}

function handleMultiChoice(q, label) {
    // For multi-choice, we need to collect all clicked labels
    const btns = document.querySelectorAll('.option-btn:not(.answered)');
    const clicked = [...btns].filter(b => b.classList.contains('selected'));
    const alreadySelected = clicked.find(b => b.dataset.label === label);

    if (alreadySelected) {
        alreadySelected.classList.remove('selected');
    } else {
        const btn = [...btns].find(b => b.dataset.label === label);
        if (btn) btn.classList.add('selected');
    }

    // Show submit button if not already present
    if (!document.getElementById('multiSubmit')) {
        const navRow = document.querySelector('.nav-row');
        const submitBtn = document.createElement('button');
        submitBtn.id = 'multiSubmit';
        submitBtn.className = 'nav-btn';
        submitBtn.textContent = '✓ 提交答案';
        submitBtn.style.cssText = 'background:var(--primary);color:#fff;border-color:var(--primary)';
        submitBtn.onclick = function() { submitMultiChoice(q); };
        navRow.insertBefore(submitBtn, navRow.firstChild);
    }
}

function submitMultiChoice(q) {
    const selected = [...document.querySelectorAll('.option-btn.selected')].map(b => b.dataset.label).sort().join('');
    const correctAnswer = (q.answer || '').split('').sort().join('');
    const correct = (selected === correctAnswer);
    const now = Date.now();
    state.answers[q.id] = {correct, timestamp: now, userAnswer: selected};
    if (!correct && q.answer) state.wrongSet.add(q.id);
    if (correct) state.wrongSet.delete(q.id);
    saveAnswers();
    saveWrongSet();
    renderAll();
    // Auto-advance on correct answer (multi)
    if (correct && state.autoAdvance) {
        const qs = getModeQuestions();
        if (state.currentIndex < qs.length - 1) {
            const targetIdx = state.currentIndex;
            setTimeout(() => {
                if (state.currentIndex === targetIdx) {
                    state.currentIndex++;
                    renderAll();
                    STORAGE.set('currentIndex', state.currentIndex);
                }
            }, 1000);
        }
    }
}

function showEssayAnswer() {
    const section = document.getElementById('essayAnswer');
    if (section) {
        section.classList.remove('hidden');
        const btn = document.querySelector('.show-btn');
        if (btn) btn.style.display = 'none';

        // Auto mark as "done" for essay
        const qs = getModeQuestions();
        const q = qs[state.currentIndex];
        if (q && !(q.id in state.answers)) {
            state.answers[q.id] = {correct: true, timestamp: Date.now(), userAnswer: 'viewed'};
            state.wrongSet.delete(q.id);
            saveAnswers();
            saveWrongSet();
            // Update header status
            const header = document.querySelector('.quiz-header span:last-child');
            if (header) header.textContent = '✅ 已查看';
        }
    }
}

function markEssayCorrect() {
    const qs = getModeQuestions();
    const q = qs[state.currentIndex];
    state.answers[q.id] = {correct: true, timestamp: Date.now(), userAnswer: 'marked_correct'};
    state.wrongSet.delete(q.id);
    saveAnswers();
    saveWrongSet();
    renderAll();
}

function markEssayWrong() {
    const qs = getModeQuestions();
    const q = qs[state.currentIndex];
    state.answers[q.id] = {correct: false, timestamp: Date.now(), userAnswer: 'marked_wrong'};
    state.wrongSet.add(q.id);
    saveAnswers();
    saveWrongSet();
    renderAll();
}

function nextQuestion() {
    const qs = getModeQuestions();
    if (state.currentIndex < qs.length - 1) {
        state.currentIndex++;
        renderAll();
        STORAGE.set('currentIndex', state.currentIndex);
    }
}

function prevQuestion() {
    if (state.currentIndex > 0) {
        state.currentIndex--;
        renderAll();
        STORAGE.set('currentIndex', state.currentIndex);
    }
}

function goToQuestion(index) {
    state.currentIndex = Math.max(0, Math.min(index, getModeQuestions().length - 1));
    renderAll();
    STORAGE.set('currentIndex', state.currentIndex);
}

// ========== Event Delegation ==========
document.getElementById('chapterTags').addEventListener('click', e => {
    const tag = e.target.closest('.filter-tag');
    if (!tag) return;
    const ch = tag.dataset.chapter;
    if (state.chapterFilter.has(ch)) {
        if (state.chapterFilter.size > 1) state.chapterFilter.delete(ch);
    } else {
        state.chapterFilter.add(ch);
    }
    state.currentIndex = 0;
    state.randomOrder = null;
    saveFilterState();
    renderAll();
});

document.getElementById('typeTags').addEventListener('click', e => {
    const tag = e.target.closest('.filter-tag');
    if (!tag) return;
    const t = tag.dataset.type;
    if (state.typeFilter.has(t)) {
        if (state.typeFilter.size > 1) state.typeFilter.delete(t);
    } else {
        state.typeFilter.add(t);
    }
    state.currentIndex = 0;
    state.randomOrder = null;
    saveFilterState();
    renderAll();
});

document.getElementById('modeSelector').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    state.mode = btn.dataset.mode;
    state.currentIndex = 0;
    state.randomOrder = null;
    saveFilterState();
    renderAll();
});

document.getElementById('searchInput').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    state.currentIndex = 0;
    state.randomOrder = null;
    saveFilterState();
    renderAll();
});

document.getElementById('questionList').addEventListener('click', e => {
    const item = e.target.closest('.q-item');
    if (!item) return;
    const idx = parseInt(item.dataset.index);
    if (!isNaN(idx)) goToQuestion(idx);
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', state.theme);
    STORAGE.set('theme', state.theme);
});

// Random jump — switches to random mode and shuffles
document.getElementById('randomBtn').addEventListener('click', () => {
    const qs = getFilteredQuestions();
    if (qs.length === 0) return;
    // Switch to random mode
    if (state.mode !== 'random') {
        state.mode = 'random';
        saveFilterState();
    }
    // Force fresh shuffle
    state.randomOrder = null;
    state.currentIndex = 0;
    renderAll();
    STORAGE.set('currentIndex', state.currentIndex);
});

// Mobile menu
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
}
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
        closeSidebar();
    } else {
        openSidebar();
    }
});
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

// Close sidebar on mobile when clicking question
document.getElementById('questionList').addEventListener('click', () => {
    if (window.innerWidth <= 768) {
        closeSidebar();
    }
});

// ========== Modals ==========
// Stats
document.getElementById('statBtn').addEventListener('click', openStatModal);
function openStatModal() {
    const qs = QUESTIONS;
    const total = qs.length;
    const done = qs.filter(q => q.id in state.answers);
    const correct = done.filter(q => state.answers[q.id].correct);
    const doneCount = done.length;
    const correctCount = correct.length;
    const accuracy = doneCount > 0 ? Math.round(correctCount / doneCount * 100) : 0;

    // Per chapter stats
    const chapters = [...new Set(qs.map(q => q.chapterCode))];
    const chapterNames = {};
    qs.forEach(q => { chapterNames[q.chapterCode] = q.chapterShort; });

    let chapterRows = chapters.map(ch => {
        const chQs = qs.filter(q => q.chapterCode === ch);
        const chDone = chQs.filter(q => q.id in state.answers);
        const chCorrect = chDone.filter(q => state.answers[q.id].correct);
        const chAcc = chDone.length > 0 ? Math.round(chCorrect.length / chDone.length * 100) : 0;
        const pct = Math.round(chDone.length / chQs.length * 100);
        return `<tr>
            <td>${chapterNames[ch]}</td>
            <td>${chDone.length}/${chQs.length}</td>
            <td><div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div></td>
            <td>${pct}%</td>
            <td class="${chAcc>=80?'good':chAcc<50?'bad':''}">${chAcc}%</td>
        </tr>`;
    }).join('');

    // Per type stats
    const types = ['single','multi','essay','material'];
    const typeNames = {single:'单选',multi:'多选',essay:'论述',material:'材料分析'};
    let typeRows = types.map(t => {
        const tQs = qs.filter(q => q.type === t);
        const tDone = tQs.filter(q => q.id in state.answers);
        const tCorrect = tDone.filter(q => state.answers[q.id].correct);
        const tAcc = tDone.length > 0 ? Math.round(tCorrect.length / tDone.length * 100) : 0;
        return `<tr>
            <td>${typeNames[t]}</td>
            <td>${tDone.length}/${tQs.length}</td>
            <td class="${tAcc>=80?'good':tAcc<50?'bad':''}">${tAcc}%</td>
        </tr>`;
    }).join('');

    document.getElementById('statContent').innerHTML = `
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val">${doneCount}<span style="font-size:14px;color:var(--text-secondary)">/${total}</span></div>
                <div class="stat-label">已做题目</div>
                <div class="progress-bar"><div class="fill" style="width:${Math.round(doneCount/total*100)}%"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${accuracy}%</div>
                <div class="stat-label">总体正确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${correctCount}</div>
                <div class="stat-label">答对题数</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${state.wrongSet.size}</div>
                <div class="stat-label">错题数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${state.favSet.size}</div>
                <div class="stat-label">收藏题目</div>
            </div>
        </div>

        <h3 style="font-size:13px;margin-bottom:8px">各章节进度</h3>
        <table class="stat-table">
            <thead><tr><th>章节</th><th>进度</th><th></th><th>完成率</th><th>正确率</th></tr></thead>
            <tbody>${chapterRows}</tbody>
        </table>

        <h3 style="font-size:13px;margin:16px 0 8px">各题型正确率</h3>
        <table class="stat-table">
            <thead><tr><th>题型</th><th>进度</th><th>正确率</th></tr></thead>
            <tbody>${typeRows}</tbody>
        </table>

        <div style="margin-top:16px;text-align:right">
            <button class="confirm-btn danger" onclick="resetProgress()">⚠️ 重置所有进度</button>
        </div>
    `;

    document.getElementById('statModal').classList.remove('hidden');
}
function closeStatModal() { document.getElementById('statModal').classList.add('hidden'); }
document.getElementById('statModal').addEventListener('click', e => {
    if (e.target === document.getElementById('statModal')) closeStatModal();
});

function resetProgress() {
    if (!confirm('确定要重置所有答题进度和错题本吗？此操作不可恢复！')) return;
    state.answers = {};
    state.wrongSet = new Set();
    state.currentIndex = 0;
    saveAnswers();
    saveWrongSet();
    closeStatModal();
    renderAll();
}

// Wrong Book
document.getElementById('wrongBookBtn').addEventListener('click', openWrongModal);
function openWrongModal() {
    const wrongQs = QUESTIONS.filter(q => state.wrongSet.has(q.id));
    if (wrongQs.length === 0) {
        document.getElementById('wrongContent').innerHTML = '<div class="wrong-empty"><p style="font-size:36px;margin-bottom:8px">🎉</p><p>错题本为空，继续保持！</p></div>';
    } else {
        document.getElementById('wrongContent').innerHTML = wrongQs.map(q => {
            const record = state.answers[q.id];
            const date = record ? new Date(record.timestamp).toLocaleDateString('zh-CN') : '';
            return `<div class="wrong-item">
                <div class="wi-info">
                    <div class="wi-title" onclick="jumpToWrong('${q.id}')">${escapeHtml(q.stem.substring(0,60))}${q.stem.length>60?'...':''}</div>
                    <div class="wi-meta">#${QUESTIONS.indexOf(q)+1} ${q.chapterShort} · ${q.typeLabel} ${date?'· '+date:''}</div>
                </div>
                <button class="wi-remove" onclick="removeFromWrong('${q.id}')">✓ 已掌握</button>
            </div>`;
        }).join('');

        document.getElementById('wrongContent').innerHTML += `
            <div style="margin-top:12px;text-align:right;display:flex;gap:8px;justify-content:flex-end">
                <button class="confirm-btn primary" onclick="exportWrongBook()">📥 导出错题</button>
                <button class="confirm-btn danger" onclick="clearWrongBook()">清空错题本</button>
            </div>`;
    }
    document.getElementById('wrongModal').classList.remove('hidden');
}
function closeWrongModal() { document.getElementById('wrongModal').classList.add('hidden'); }
document.getElementById('wrongModal').addEventListener('click', e => {
    if (e.target === document.getElementById('wrongModal')) closeWrongModal();
});
window.jumpToWrong = function(qid) {
    // Switch mode to sequential/all and find the question
    state.chapterFilter = new Set(QUESTIONS.map(q => q.chapterCode));
    state.typeFilter = new Set(['single','multi','essay','material']);
    state.searchQuery = '';
    state.mode = 'sequential';
    document.getElementById('searchInput').value = '';
    closeWrongModal();
    const qs = getModeQuestions();
    const idx = qs.findIndex(q => q.id === qid);
    if (idx >= 0) {
        state.currentIndex = idx;
        renderAll();
        closeSidebar();
    }
};
window.removeFromWrong = function(qid) {
    state.wrongSet.delete(qid);
    saveWrongSet();
    updateWrongBadge();
    openWrongModal();
    renderAll();
};
window.clearWrongBook = function() {
    if (!confirm('确定要清空所有错题吗？')) return;
    state.wrongSet = new Set();
    saveWrongSet();
    updateWrongBadge();
    closeWrongModal();
    renderAll();
};

window.exportWrongBook = function() {
    const wrongQs = QUESTIONS.filter(q => state.wrongSet.has(q.id));
    if (wrongQs.length === 0) {
        alert('错题本为空，无需导出');
        return;
    }

    let mdContent = `# 错题本\n\n`;
    mdContent += `> 导出时间: ${new Date().toLocaleString('zh-CN')}\n`;
    mdContent += `> 错题数量: ${wrongQs.length} 题\n\n`;

    wrongQs.forEach((q, index) => {
        const record = state.answers[q.id];
        const userAnswer = record?.userAnswer || '未作答';
        const correctAnswer = q.answer || '暂无标准答案';
        
        mdContent += `## ${index + 1}. ${q.chapterShort} · ${q.typeLabel}\n\n`;
        mdContent += `**题目**: ${q.stem}\n\n`;
        
        if (q.options && q.options.length > 0) {
            mdContent += `**选项**:\n`;
            q.options.forEach(opt => {
                mdContent += `  - ${opt.label}. ${opt.text}\n`;
            });
            mdContent += `\n`;
        }
        
        mdContent += `**你的答案**: ${userAnswer}\n`;
        mdContent += `**正确答案**: ${correctAnswer}\n\n`;
    });

    const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `错题本_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert(`成功导出 ${wrongQs.length} 道错题！`);
};

function updateWrongBadge() {
    const badge = document.getElementById('wrongBadge');
    badge.textContent = state.wrongSet.size;
    badge.style.display = state.wrongSet.size > 0 ? 'inline' : 'none';
    const favBadge = document.getElementById('favBadge');
    favBadge.textContent = state.favSet.size;
    favBadge.style.display = state.favSet.size > 0 ? 'inline' : 'none';
}

// ========== Favorite ==========
window.toggleFav = function(qid) {
    if (state.favSet.has(qid)) {
        state.favSet.delete(qid);
    } else {
        state.favSet.add(qid);
    }
    saveFavSet();
    updateWrongBadge();
    renderQuestion();
};

// Auto-advance toggle
document.getElementById('autoAdvanceToggle').addEventListener('click', function() {
    state.autoAdvance = !state.autoAdvance;
    STORAGE.set('autoAdvance', state.autoAdvance);
    this.classList.toggle('on', state.autoAdvance);
});

// Favorite book button
document.getElementById('favBookBtn').addEventListener('click', () => {
    state.chapterFilter = new Set(QUESTIONS.map(q => q.chapterCode));
    state.typeFilter = new Set(['single','multi','essay','material']);
    state.searchQuery = '';
    state.mode = 'favorites';
    state.currentIndex = 0;
    document.getElementById('searchInput').value = '';
    renderAll();
});

// ========== Keyboard Navigation ==========
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'j') {
        e.preventDefault();
        nextQuestion();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'k') {
        e.preventDefault();
        prevQuestion();
    } else if (e.key === 'r') {
        document.getElementById('randomBtn').click();
    }
});

// ========== Init ==========
(async function init() {
    // 1. Try localStorage cache first (synchronous, instant)
    const cached = STORAGE.get('dataCache');
    if (cached && cached.data) {
        try {
            const jsonData = JSON.parse(cached.data);
            QUESTIONS = transformQuestions(jsonData);
            console.log('从缓存加载 ' + QUESTIONS.length + ' 道题目');
        } catch (e) { /* fall through to network */ }
    }

    // 2. If no cache available, must wait for network
    if (QUESTIONS.length === 0) {
        const ok = await loadQuestions();
        if (!ok) return;
    }

    // 3. Re-initialize filters that depend on QUESTIONS (was empty at script parse time)
    if (!STORAGE.get("chapterFilter")) {
        state.chapterFilter = new Set(QUESTIONS.map(q => q.chapterCode));
    }
    // Restore theme
    if (state.theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // Restore auto-advance toggle
    const autoToggle = document.getElementById('autoAdvanceToggle');
    if (!state.autoAdvance) {
        autoToggle.classList.remove('on');
    }

    // Restore last index (validate bounds first to avoid double render)
    const savedIdx = STORAGE.get('currentIndex');
    const qs = getModeQuestions();
    if (savedIdx !== null && savedIdx >= 0 && savedIdx < qs.length) {
        state.currentIndex = savedIdx;
    } else {
        state.currentIndex = 0;
    }

    // Restore search input display
    if (state.searchQuery) {
        document.getElementById('searchInput').value = state.searchQuery;
    }

    renderAll();

    // 4. Background: refresh cache from network silently
    fetch('data.json')
        .then(resp => {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.text();
        })
        .then(jsonText => {
            if (!cached || cached.data !== jsonText) {
                const jsonData = JSON.parse(jsonText);
                QUESTIONS = transformQuestions(jsonData);
                STORAGE.set('dataCache', { data: jsonText, timestamp: Date.now(), count: QUESTIONS.length });
                // Reset filters for updated data
                state.chapterFilter = new Set(QUESTIONS.map(q => q.chapterCode));
                state.currentIndex = Math.min(state.currentIndex, getModeQuestions().length - 1);
                renderAll();
                console.log('后台更新题库 ' + QUESTIONS.length + ' 题');
            }
        })
        .catch(() => {}); // silent fail — cache is already serving the UI
})();
</script>
