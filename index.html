<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马克思主义原理 · 刷题复习系统</title>
<style>
:root {
    --bg: #fafaf7; --surface: #ffffff; --text: #1d1d1f;
    --text-secondary: #6e6e73; --border: #e8e5e0;
    --accent: #7d5a3c; --accent-soft: #f5f1ec;
    --font-serif: 'Iowan Old Style', 'Noto Serif SC', 'Songti SC', Georgia, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: var(--font-sans); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
}
.container { text-align: center; padding: 48px 24px; max-width: 520px; }
h1 {
    font-family: var(--font-serif); font-size: 26px; font-weight: 600;
    letter-spacing: 1px; margin-bottom: 8px;
}
.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 48px; letter-spacing: .3px; }
.cards { display: flex; flex-direction: column; gap: 12px; }
.card {
    display: block; padding: 24px 28px; background: var(--surface);
    border-radius: 12px; border: 1px solid var(--border);
    text-decoration: none; text-align: left;
    transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.07); border-color: var(--accent); }
.card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.card-meta { font-size: 10px; color: var(--accent); margin-top: 8px; letter-spacing: .5px; text-transform: uppercase; }
.footer { margin-top: 48px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="container">
    <h1>马克思主义原理</h1>
    <p class="subtitle">刷题复习系统</p>
    <div class="cards">
        <a class="card" href="/exam.html">
            <div class="card-title">选择题 · 判断题</div>
            <div class="card-desc">454 道题目，按章节分类，支持单选、多选、材料分析。自动批改、错题本、收藏夹。</div>
            <div class="card-meta">进入刷题 &rarr;</div>
        </a>
        <a class="card" href="/review.html">
            <div class="card-title">简答题 · 背诵复习</div>
            <div class="card-desc">31 道高频考点，主动回忆 + 自我评估模式。按薄弱环节精准复习。</div>
            <div class="card-meta">进入复习 &rarr;</div>
        </a>
    </div>
    <p class="footer">本地服务器 · 仅供学习使用</p>
</div>
</body>
</html>
